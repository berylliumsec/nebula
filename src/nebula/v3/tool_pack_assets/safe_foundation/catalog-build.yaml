# Release input, not an installable catalog. The release job builds both OCI
# platforms, substitutes every {{sha256:*}} token, validates canonical manifests,
# signs them offline, then emits tools.nebula.security/catalog/v1 JSON.
catalog_url: https://berylliumsec.github.io/nebula-tools/catalog-v1.json
catalog_signature_url: https://berylliumsec.github.io/nebula-tools/catalog-v1.json.signature.json
image_registry: ghcr.io/berylliumsec/nebula-tools
packs:
  - network/nebula-tool-pack.yaml
  - web/nebula-tool-pack.yaml
  - intelligence/nebula-tool-pack.yaml
  - code/nebula-tool-pack.yaml
