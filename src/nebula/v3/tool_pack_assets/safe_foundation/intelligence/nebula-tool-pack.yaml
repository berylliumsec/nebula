api_version: tools.nebula.security/v1
kind: ToolPack
metadata:
  publisher: berylliumsec
  name: safe-intelligence
  version: 0.1.0
  minimum_nebula_version: 3.0.0a1
  description: Offline SearchSploit index queries.
  licenses: [GPL-2.0-only]
images:
  - {name: searchsploit, platform: linux/amd64, image: "ghcr.io/berylliumsec/nebula-tools/searchsploit@{{sha256:searchsploit-amd64}}", sbom: sbom/searchsploit-amd64.cdx.json, provenance: provenance/searchsploit-amd64.intoto.jsonl}
  - {name: searchsploit, platform: linux/arm64, image: "ghcr.io/berylliumsec/nebula-tools/searchsploit@{{sha256:searchsploit-arm64}}", sbom: sbom/searchsploit-arm64.cdx.json, provenance: provenance/searchsploit-arm64.intoto.jsonl}
permissions: {network: false, workspace: none, credentials: []}
tools:
  - name: searchsploit.query
    description: Query the image-pinned offline Exploit-DB index.
    image: searchsploit
    executable: /usr/bin/searchsploit
    fixed_arguments: [--json]
    argument_bindings:
      - {argument: query, kind: positional}
    input_schema:
      type: object
      properties: {query: {type: string, minLength: 2, maxLength: 500}}
      required: [query]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        SEARCH: {type: string}
        DB_PATH_EXPLOIT: {type: string}
        DB_PATH_SHELLCODE: {type: string}
        RESULTS_EXPLOIT: {type: array}
        RESULTS_SHELLCODE: {type: array}
      required: [RESULTS_EXPLOIT, RESULTS_SHELLCODE]
      additionalProperties: false
    policy: {risk_class: local_read, network_access: false, filesystem_access: none, requires_approval: false, idempotency: safe}
    parser: {built_in: json/v1}
    smoke_tests:
      - {arguments: {query: openssh}, expected_exit_code: 0, timeout_seconds: 30}
