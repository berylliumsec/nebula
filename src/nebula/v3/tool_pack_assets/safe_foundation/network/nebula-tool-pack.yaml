api_version: tools.nebula.security/v1
kind: ToolPack
metadata:
  publisher: berylliumsec
  name: safe-network
  version: 0.1.0
  minimum_nebula_version: 3.0.0a1
  description: Bounded unprivileged Nmap connect and service discovery.
  licenses: [Nmap]
  homepage: https://nmap.org/
images:
  - {name: nmap, platform: linux/amd64, image: "ghcr.io/berylliumsec/nebula-tools/nmap@{{sha256:nmap-amd64}}", sbom: sbom/nmap-amd64.cdx.json, provenance: provenance/nmap-amd64.intoto.jsonl}
  - {name: nmap, platform: linux/arm64, image: "ghcr.io/berylliumsec/nebula-tools/nmap@{{sha256:nmap-arm64}}", sbom: sbom/nmap-arm64.cdx.json, provenance: provenance/nmap-arm64.intoto.jsonl}
permissions: {network: true, workspace: none, credentials: []}
tools:
  - name: nmap.connect_scan
    description: Run an unprivileged TCP connect scan against approved ports.
    image: nmap
    executable: /usr/bin/nmap
    fixed_arguments: [-sT, -n, -oX, -]
    argument_bindings:
      - {argument: ports, kind: csv, flag: -p}
      - {argument: target, kind: positional}
    input_schema:
      type: object
      properties:
        target: {type: string, minLength: 1, maxLength: 253}
        ports: {type: array, minItems: 1, maxItems: 1024, uniqueItems: true, items: {type: integer, minimum: 1, maximum: 65535}}
      required: [target, ports]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        scanner: {type: string}
        arguments: {type: string}
        hosts: {type: array}
        summary:
          type: object
          properties:
            time: {type: string}
            timestr: {type: string}
            summary: {type: string}
            elapsed: {type: string}
            exit: {type: string}
            errormsg: {type: string}
          additionalProperties: false
      required: [scanner, arguments, hosts, summary]
      additionalProperties: false
    policy: {risk_class: active_scan, target_argument: target, port_argument: ports, network_access: true, filesystem_access: none, requires_approval: true, idempotency: key_required}
    parser: {built_in: nmap.xml/v1}
    smoke_tests:
      - {arguments: {target: 127.0.0.1, ports: [1]}, expected_exit_code: 0, timeout_seconds: 30}
  - name: nmap.service_scan
    description: Identify services using unprivileged TCP connect probes.
    image: nmap
    executable: /usr/bin/nmap
    fixed_arguments: [-sT, -sV, -n, --version-light, -oX, -]
    argument_bindings:
      - {argument: ports, kind: csv, flag: -p}
      - {argument: target, kind: positional}
    input_schema:
      type: object
      properties:
        target: {type: string, minLength: 1, maxLength: 253}
        ports: {type: array, minItems: 1, maxItems: 1024, uniqueItems: true, items: {type: integer, minimum: 1, maximum: 65535}}
      required: [target, ports]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        scanner: {type: string}
        arguments: {type: string}
        hosts: {type: array}
        summary:
          type: object
          properties:
            time: {type: string}
            timestr: {type: string}
            summary: {type: string}
            elapsed: {type: string}
            exit: {type: string}
            errormsg: {type: string}
          additionalProperties: false
      required: [scanner, arguments, hosts, summary]
      additionalProperties: false
    policy: {risk_class: active_scan, target_argument: target, port_argument: ports, network_access: true, filesystem_access: none, requires_approval: true, idempotency: key_required}
    parser: {built_in: nmap.xml/v1}
    smoke_tests:
      - {arguments: {target: 127.0.0.1, ports: [1]}, expected_exit_code: 0, timeout_seconds: 30}
