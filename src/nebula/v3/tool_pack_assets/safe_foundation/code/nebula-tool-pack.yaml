api_version: tools.nebula.security/v1
kind: ToolPack
metadata:
  publisher: berylliumsec
  name: safe-code
  version: 0.1.0
  minimum_nebula_version: 3.0.0a1
  description: Offline Semgrep analysis with SARIF output.
  licenses: [LGPL-2.1-or-later]
images:
  - {name: semgrep, platform: linux/amd64, image: "ghcr.io/berylliumsec/nebula-tools/semgrep@{{sha256:semgrep-amd64}}", sbom: sbom/semgrep-amd64.cdx.json, provenance: provenance/semgrep-amd64.intoto.jsonl}
  - {name: semgrep, platform: linux/arm64, image: "ghcr.io/berylliumsec/nebula-tools/semgrep@{{sha256:semgrep-arm64}}", sbom: sbom/semgrep-arm64.cdx.json, provenance: provenance/semgrep-arm64.intoto.jsonl}
permissions: {network: false, workspace: read, credentials: []}
tools:
  - name: semgrep.scan
    description: Scan an assigned workspace path using bundled rules without network access.
    image: semgrep
    executable: /usr/local/bin/semgrep
    fixed_arguments: [scan, --sarif, --disable-version-check, --metrics, "off", --config, /opt/nebula/rules]
    argument_bindings:
      - {argument: path, kind: positional}
    input_schema:
      type: object
      properties: {path: {type: string, minLength: 1, maxLength: 2048}}
      required: [path]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        "$schema": {type: string}
        version: {type: string}
        runs: {type: array}
      required: [version, runs]
      additionalProperties: false
    policy: {risk_class: local_read, path_arguments: [path], network_access: false, filesystem_access: read, requires_approval: false, idempotency: safe}
    parser: {built_in: sarif/v2.1}
    smoke_tests:
      - {arguments: {path: /opt/nebula/rules}, expected_exit_code: 0, timeout_seconds: 30}
