protocol: nebula.toolbox.interface-source/v2
name: ffuf
version_key: FFUF_VERSION
executable: /usr/local/bin/ffuf
category: web
risk_class: active_scan
description: Fast web content and parameter fuzzer.
homepage: https://github.com/ffuf/ffuf
synopsis: ffuf [flags]
version_probe:
- /usr/local/bin/ffuf
- -V
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/local/bin/ffuf
  - -h
positionals: []
examples:
- purpose: Discover paths from a workspace wordlist
  arguments:
  - -u
  - https://{target}/FUZZ
  - -w
  - /workspace/wordlist.txt
  - -of
  - json
  - -o
  - /workspace/ffuf.json
notes:
- Set an explicit rate and timeout appropriate for the engagement.
option_overrides:
  h:
    value: {name: HEADER, type: string, required: true, style: separate}
    repeatable: true
  x__upper_x:
    value: {name: METHOD, type: string, required: true, style: separate}
  b:
    value: {name: COOKIE_DATA, type: string, required: true, style: separate}
  cc:
    value: {name: CLIENT_CERT, type: path, required: true, style: separate}
    requires: [ck]
  ck:
    value: {name: CLIENT_KEY, type: path, required: true, style: separate}
    requires: [cc]
  d__d:
    value: {name: DATA, type: string, required: true, style: separate}
  recursion_depth:
    value: {name: DEPTH, type: integer, required: true, style: separate, minimum: 0}
  recursion_strategy:
    value: {name: STRATEGY, type: string, required: true, style: separate, enum: [default, greedy], default: default}
  replay_proxy:
    value: {name: PROXY_URL, type: url, required: true, style: separate}
  sni:
    value: {name: SNI, type: domain, required: true, style: separate}
  timeout:
    value: {name: SECONDS, type: integer, required: true, style: separate, minimum: 1, default: 10}
  u:
    value: {name: URL, type: url, required: true, style: separate}
  x__x:
    value: {name: PROXY_URL, type: url, required: true, style: separate}
  acc:
    value: {name: CALIBRATION_STRING, type: string, required: true, style: separate}
    repeatable: true
    implies: [ac]
  ack:
    value: {name: KEYWORD, type: string, required: true, style: separate, default: FUZZ}
  acs:
    value: {name: STRATEGY, type: string, required: true, style: separate}
    repeatable: true
    implies: [ac]
  config:
    value: {name: FILE, type: path, required: true, style: separate}
  maxtime:
    value: {name: SECONDS, type: integer, required: true, style: separate, minimum: 0, default: 0}
  maxtime_job:
    value: {name: SECONDS, type: integer, required: true, style: separate, minimum: 0, default: 0}
  p:
    value: {name: DELAY_OR_RANGE, type: duration, required: true, style: separate}
  rate:
    value: {name: REQUESTS_PER_SECOND, type: integer, required: true, style: separate, minimum: 0, default: 0}
  sa:
    implies: [se, sf]
  scraperfile:
    value: {name: FILE, type: path, required: true, style: separate}
  scrapers:
    value: {name: GROUPS, type: string, required: true, style: separate, default: all}
  search:
    value: {name: FFUFHASH, type: string, required: true, style: separate}
  t:
    value: {name: THREADS, type: integer, required: true, style: separate, minimum: 1, default: 40}
  mc:
    value: {name: STATUS_CODES, type: string, required: true, style: separate, default: "200-299,301,302,307,401,403,405,500"}
  ml:
    value: {name: LINE_COUNT, type: string, required: true, style: separate}
  mmode:
    value: {name: OPERATOR, type: string, required: true, style: separate, enum: [and, or], default: or}
  mr:
    value: {name: REGEXP, type: string, required: true, style: separate}
  ms:
    value: {name: SIZE, type: string, required: true, style: separate}
  mt:
    value: {name: TIME_COMPARISON, type: string, required: true, style: separate, pattern: "^[<>][0-9]+$"}
  mw:
    value: {name: WORD_COUNT, type: string, required: true, style: separate}
  fc:
    value: {name: STATUS_CODES, type: string, required: true, style: separate}
  fl:
    value: {name: LINE_COUNTS, type: string, required: true, style: separate}
  fmode:
    value: {name: OPERATOR, type: string, required: true, style: separate, enum: [and, or], default: or}
  fr:
    value: {name: REGEXP, type: string, required: true, style: separate}
  fs:
    value: {name: SIZES, type: string, required: true, style: separate}
  ft:
    value: {name: TIME_COMPARISON, type: string, required: true, style: separate, pattern: "^[<>][0-9]+$"}
  fw:
    value: {name: WORD_COUNTS, type: string, required: true, style: separate}
  e:
    value: {name: EXTENSIONS, type: string, required: true, style: separate}
  enc:
    value: {name: ENCODERS, type: string, required: true, style: separate}
  input_cmd:
    value: {name: COMMAND, type: string, required: true, style: separate}
    requires: [input_num]
    conflicts_with: [w]
  input_num:
    value: {name: COUNT, type: integer, required: true, style: separate, minimum: 1, default: 100}
    requires: [input_cmd]
  input_shell:
    value: {name: SHELL, type: path, required: true, style: separate}
  mode:
    value: {name: MODE, type: string, required: true, style: separate, enum: [clusterbomb, pitchfork, sniper], default: clusterbomb}
  request:
    value: {name: FILE, type: path, required: true, style: separate}
  request_proto:
    value: {name: PROTOCOL, type: string, required: true, style: separate, enum: [http, https], default: https}
  w:
    value: {name: WORDLIST_AND_OPTIONAL_KEYWORD, type: string, required: true, style: separate}
    repeatable: true
    conflicts_with: [input_cmd]
  audit_log:
    value: {name: FILE, type: path, required: true, style: separate}
  debug_log:
    value: {name: FILE, type: path, required: true, style: separate}
  o:
    value: {name: FILE, type: path, required: true, style: separate}
  od:
    value: {name: DIRECTORY, type: path, required: true, style: separate}
  of:
    value: {name: FORMAT, type: string, required: true, style: separate, enum: [json, ejson, html, md, csv, ecsv, all], default: json}
