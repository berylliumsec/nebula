protocol: nebula.toolbox.interface-source/v2
name: curl
version_key: CURL_VERSION
executable: /usr/bin/curl
category: web
risk_class: active_scan
description: Transfer data with HTTP and other URL protocols.
homepage: https://curl.se/docs/manpage.html
synopsis: curl [options] URL
version_probe:
- /usr/bin/curl
- --version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/bin/curl
  - --help
  - all
positionals:
- id: url
  name: URL
  type: url
  required: true
  repeatable: true
  description: One or more URLs to transfer.
examples:
- purpose: Fetch response headers
  arguments:
  - --fail
  - --silent
  - --show-error
  - --head
  - https://{target}/
notes:
- Keep URLs bound to the broker-authorized target and ports.
option_overrides: {}
package_version_key: CURL_APT_VERSION
