protocol: nebula.toolbox.interface-source/v2
name: subfinder
version_key: SUBFINDER_VERSION
executable: /usr/local/bin/subfinder
category: discovery
risk_class: active_scan
description: Passive subdomain discovery utility.
homepage: https://github.com/projectdiscovery/subfinder
synopsis: subfinder [flags]
version_probe:
- /usr/local/bin/subfinder
- -version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/local/bin/subfinder
  - -h
positionals: []
examples:
- purpose: Enumerate one domain as JSONL
  arguments:
  - -d
  - '{target}'
  - -json
  - -o
  - /workspace/subfinder.jsonl
notes:
- Provider API keys are not injected into Toolbox by default.
option_overrides: {}
