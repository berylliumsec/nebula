protocol: nebula.toolbox.interface-source/v2
name: testssl
version_key: TESTSSL_VERSION
executable: /opt/nebula/testssl/testssl.sh
category: web
risk_class: active_scan
description: TLS protocol, cipher, and configuration analyzer.
homepage: https://testssl.sh/
synopsis: testssl.sh [options] URI
version_probe:
- /opt/nebula/testssl/testssl.sh
- --version
version_exit_codes:
- 0
- 1
documentation:
- command_path: []
  argv:
  - /opt/nebula/testssl/testssl.sh
  - --help
positionals:
- id: uri
  name: URI
  type: url
  required: true
  repeatable: false
  description: TLS endpoint URI or host and port.
examples:
- purpose: Produce JSON TLS evidence
  arguments:
  - --quiet
  - --jsonfile
  - /workspace/testssl.json
  - '{target}:443'
notes:
- Use a broker-authorized host and port; scan duration can be significant.
option_overrides: {}
