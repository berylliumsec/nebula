protocol: nebula.toolbox.interface-source/v2
name: ps
version_key: PROCPS_VERSION
executable: /usr/bin/ps
category: utility
risk_class: local_read
description: Inspect processes inside the disposable tool container.
homepage: https://gitlab.com/procps-ng/procps
synopsis: ps [options]
version_probe:
- /usr/bin/ps
- --version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/bin/ps
  - --help
  - all
positionals: []
examples:
- purpose: List container processes
  arguments:
  - -ef
notes:
- Host processes are outside the container namespace and cannot be inspected.
option_overrides: {}
package_version_key: PROCPS_APT_VERSION
