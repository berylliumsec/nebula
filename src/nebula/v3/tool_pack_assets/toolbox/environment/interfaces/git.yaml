protocol: nebula.toolbox.interface-source/v2
name: git
version_key: GIT_VERSION
executable: /usr/bin/git
category: utility
risk_class: workspace_write
description: Inspect and manipulate Git repositories in the engagement workspace.
homepage: https://git-scm.com/docs
synopsis: git [global-options] command [command-options]
version_probe:
- /usr/bin/git
- --version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/bin/git
  - --help
- command_path: []
  argv:
  - /usr/bin/git
  - help
  - -a
positionals: []
examples:
- purpose: Inspect workspace changes
  arguments:
  - -C
  - /workspace
  - status
  - --short
notes:
- Network operations require environment.run_network and an authorized endpoint.
option_overrides: {}
package_version_key: GIT_APT_VERSION
command_discovery: git
