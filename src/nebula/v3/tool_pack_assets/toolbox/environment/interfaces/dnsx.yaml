protocol: nebula.toolbox.interface-source/v2
name: dnsx
version_key: DNSX_VERSION
executable: /usr/local/bin/dnsx
category: discovery
risk_class: active_scan
description: Fast DNS toolkit for resolving and probing names.
homepage: https://github.com/projectdiscovery/dnsx
synopsis: dnsx [flags]
version_probe:
- /usr/local/bin/dnsx
- -version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/local/bin/dnsx
  - -h
positionals:
- id: target
  name: TARGET
  type: target
  required: false
  repeatable: true
  description: Domain or input supplied when flags do not provide it.
examples:
- purpose: Resolve a domain as JSONL
  arguments:
  - -d
  - '{target}'
  - -json
  - -silent
notes:
- Prefer file inputs under /workspace for large name sets.
option_overrides: {}
