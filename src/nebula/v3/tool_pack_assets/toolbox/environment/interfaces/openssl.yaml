protocol: nebula.toolbox.interface-source/v2
name: openssl
version_key: OPENSSL_VERSION
executable: /usr/bin/openssl
category: crypto
risk_class: active_scan
description: Inspect TLS endpoints, certificates, and cryptographic data.
homepage: https://docs.openssl.org/3.0/man1/openssl/
synopsis: openssl command [options]
version_probe:
- /usr/bin/openssl
- version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/bin/openssl
  - help
positionals: []
examples:
- purpose: Inspect a TLS certificate chain
  arguments:
  - s_client
  - -connect
  - '{target}:443'
  - -servername
  - '{target}'
  - -showcerts
notes:
- Use explicit ports that are present in the mission grant.
option_overrides: {}
package_version_key: OPENSSL_APT_VERSION
command_discovery: openssl
