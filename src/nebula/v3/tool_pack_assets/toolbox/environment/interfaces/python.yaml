protocol: nebula.toolbox.interface-source/v2
name: python
version_key: PYTHON_VERSION
executable: /opt/nebula/venv/bin/python
category: utility
risk_class: workspace_write
description: Python runtime for local evidence transformation and scripted analysis.
homepage: https://docs.python.org/3.12/
synopsis: python [options] [-c command | -m module | file] [args]
version_probe:
- /opt/nebula/venv/bin/python
- --version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /opt/nebula/venv/bin/python
  - --help
positionals:
- id: source
  name: COMMAND|MODULE|FILE
  type: string
  required: false
  repeatable: false
  description: Python command, module, or file selected by preceding options.
- id: arguments
  name: ARG
  type: string
  required: false
  repeatable: true
  description: Arguments passed to the selected Python source.
examples:
- purpose: Run a workspace analysis script
  arguments:
  - /workspace/analyze.py
notes:
- Python runs only in the disposable container and receives no provider credentials.
option_overrides: {}
