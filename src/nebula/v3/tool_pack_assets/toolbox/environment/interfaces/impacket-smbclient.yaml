protocol: nebula.toolbox.interface-source/v2
name: impacket-smbclient
version_key: IMPACKET_VERSION
executable: /opt/nebula/venv/bin/smbclient.py
category: network
risk_class: exploitation
description: Interactive SMB client from Impacket.
homepage: https://github.com/fortra/impacket
synopsis: impacket-smbclient [options] [[domain/]username[:password]@]target
version_probe:
- /opt/nebula/venv/bin/smbclient.py
- -h
version_exit_codes:
- 0
- 1
documentation:
- command_path: []
  argv:
  - /opt/nebula/venv/bin/smbclient.py
  - -h
positionals:
- id: target
  name: '[[DOMAIN/]USERNAME[:PASSWORD]@]TARGET'
  type: string
  required: true
  repeatable: false
  description: Impacket target connection string.
examples:
- purpose: Connect without a password
  arguments:
  - -no-pass
  - '{target}'
notes:
- Credential use and remote writes require an explicit approval.
option_overrides: {}
