protocol: nebula.toolbox.interface-source/v2
name: katana
version_key: KATANA_VERSION
executable: /usr/local/bin/katana
category: web
risk_class: active_scan
description: Web crawler and endpoint discovery utility.
homepage: https://github.com/projectdiscovery/katana
synopsis: katana [flags]
version_probe:
- /usr/local/bin/katana
- -version
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/local/bin/katana
  - -h
positionals: []
examples:
- purpose: Crawl one target as JSONL
  arguments:
  - -u
  - https://{target}
  - -jsonl
  - -o
  - /workspace/katana.jsonl
notes:
- Headless crawling is not included in the lean Toolbox image.
option_overrides: {}
