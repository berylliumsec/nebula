protocol: nebula.toolbox.interface-source/v2
name: dig
version_key: BIND_VERSION
executable: /usr/bin/dig
category: discovery
risk_class: active_scan
description: Query DNS servers and inspect DNS records.
homepage: https://bind9.readthedocs.io/
synopsis: dig [@server] name [type] [query-options]
version_probe:
- /usr/bin/dig
- -v
version_exit_codes:
- 0
documentation:
- command_path: []
  argv:
  - /usr/bin/dig
  - -h
positionals:
- id: query
  name: NAME
  type: domain
  required: true
  repeatable: false
  description: DNS name to query.
examples:
- purpose: Resolve A records
  arguments:
  - '{target}'
  - A
  - +short
notes:
- DNS access remains subject to the mission egress policy.
option_overrides: {}
package_version_key: DNSUTILS_APT_VERSION
