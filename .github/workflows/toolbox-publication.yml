name: Publish Nebula Toolbox

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Immutable nebula-toolbox-v* tag, or a ref for source validation
        required: true
        default: main
        type: string
      mode:
        description: Validate source or publish a protected release
        required: true
        default: validate-source
        type: choice
        options: [validate-source, publish]
  push:
    tags: ["nebula-toolbox-v*"]

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write
  pages: write

concurrency:
  group: toolbox-publication-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/berylliumsec/nebula-toolbox
  TOOLBOX_VERSION: 0.1.3
  SOURCE_ROOT: src/nebula/v3/tool_pack_assets/toolbox
  ENVIRONMENT_ROOT: src/nebula/v3/tool_pack_assets/toolbox/environment

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      release_ref: ${{ steps.release.outputs.release_ref }}
      generated_at: ${{ steps.release-time.outputs.generated_at }}
    steps:
      - name: Resolve release input
        id: release
        env:
          DISPATCH_REF: ${{ inputs.release_ref }}
          DISPATCH_MODE: ${{ inputs.mode }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = push ]; then
            release_ref="$GITHUB_REF_NAME"
            publish=true
          else
            release_ref="$DISPATCH_REF"
            if [ "$DISPATCH_MODE" = publish ]; then publish=true; else publish=false; fi
          fi
          if [ "$publish" = true ]; then
            case "$release_ref" in nebula-toolbox-v*) ;; *) printf 'publishing requires nebula-toolbox-v*\n' >&2; exit 1 ;; esac
          fi
          printf 'publish=%s\nrelease_ref=%s\n' "$publish" "$release_ref" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.release_ref }}
      - name: Require an immutable publication tag
        if: steps.release.outputs.publish == 'true'
        id: timestamp
        run: |
          git show-ref --verify --quiet "refs/tags/${{ steps.release.outputs.release_ref }}"
          test "$(git rev-list -n 1 '${{ steps.release.outputs.release_ref }}')" = "$(git rev-parse HEAD)"
          test "${{ steps.release.outputs.release_ref }}" = "nebula-toolbox-v${TOOLBOX_VERSION}"
          printf 'generated_at=%s\n' "$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
      - name: Select deterministic catalog timestamp
        id: release-time
        run: |
          if [ "${{ steps.release.outputs.publish }}" = true ]; then
            value="${{ steps.timestamp.outputs.generated_at }}"
          else
            value="$(git show -s --format=%cI HEAD)"
          fi
          printf 'generated_at=%s\n' "$value" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked validation dependencies
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --without legacy,legacy-dev --with dev --no-interaction
      - name: Validate Toolbox source
        run: poetry run python -m scripts.validate_tool_pack_release --json > toolbox-readiness.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: toolbox-readiness-${{ github.run_id }}
          path: toolbox-readiness.json
          retention-days: 30

  build:
    if: needs.prepare.outputs.publish == 'true'
    needs: prepare
    runs-on: ${{ matrix.runner }}
    environment: tool-pack-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-22.04
          - architecture: arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push immutable Toolbox platform image
        id: image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ env.ENVIRONMENT_ROOT }}
          file: ${{ env.ENVIRONMENT_ROOT }}/Containerfile
          platforms: linux/${{ matrix.architecture }}
          push: true
          pull: true
          no-cache: true
          tags: ${{ env.IMAGE }}:${{ env.TOOLBOX_VERSION }}-${{ matrix.architecture }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.TOOLBOX_VERSION }}
            org.opencontainers.image.title=Nebula Toolbox
      - name: Smoke-test the immutable Toolbox image
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          . "$ENVIRONMENT_ROOT/tool-versions.env"
          reference="$IMAGE@$DIGEST"
          platform="linux/$ARCHITECTURE"
          docker pull --platform "$platform" "$reference"
          user="$(docker image inspect --format '{{.Config.User}}' "$reference")"
          test -n "$user" && test "$user" != 0 && test "$user" != root
          test "$(docker image inspect --format '{{json .Config.Entrypoint}}' "$reference")" = null

          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox search --query nmap > search.json
          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox help --tool jq \
            --command-path-json '[]' > help.json
          docker run --rm --platform "$platform" --network none "$reference" \
            /bin/bash --noprofile --norc -c 'cat /opt/nebula/tool-catalog.json' \
            > "toolbox-$ARCHITECTURE.model-catalog.json"
          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox exec --max-risk workspace_write \
            --tool jq \
            --invocation-json '{"command_path":[],"options":[],"positionals":[{"id":"filter","value":"."}]}' \
            --cwd /workspace \
            --timeout 30 > local.json
          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox shell --script \
            "command -v perl >/dev/null && printf 'one\\ntwo\\n' | perl -ne 'print' | wc -l" \
            --cwd /workspace --timeout 30 \
            > shell.json
          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox shell --script \
            "test ! -x /usr/local/bin/nebula-egress && test ! -e /opt/nebula/bin/build-tool-catalog" \
            --cwd /workspace --timeout 30 \
            > internal-helper-refusal.json
          printf "printf 'raw-bash-output\\n'\\n" | \
            docker run --rm --interactive --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox code --language bash \
            > code-bash.raw
          grep -Fx "raw-bash-output" code-bash.raw
          printf "printf 'raw-sh-output\\n'\\n" | \
            docker run --rm --interactive --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox code --language sh \
            > code-sh.raw
          grep -Fx "raw-sh-output" code-sh.raw
          printf "import sys\\nprint(repr(sys.stdin.read()))\\n" | \
            docker run --rm --interactive --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox code --language python \
            > code-python.raw
          grep -Fx "''" code-python.raw
          docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/venv/bin/semgrep --version | grep -Fx "$SEMGREP_VERSION"
          if docker run --rm --platform "$platform" --network none "$reference" \
            /opt/nebula/bin/nebula-toolbox exec --max-risk active_scan \
            --tool sqlmap \
            --invocation-json '{"command_path":[],"options":[],"positionals":[]}' \
            --cwd /workspace \
            --timeout 30 > refusal.json; then
            printf 'risk ceiling did not reject sqlmap\n' >&2
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          expected = {
              "search.json": ("search", 0),
              "help.json": ("help", 0),
              "local.json": ("exec", 0),
              "shell.json": ("shell", 0),
              "internal-helper-refusal.json": ("shell", 0),
              "refusal.json": ("error", 2),
          }
          for filename, (operation, exit_code) in expected.items():
              payload = json.loads(Path(filename).read_text(encoding="utf-8"))
              assert payload["protocol"] == "nebula.toolbox/v1"
              assert payload["operation"] == operation
              assert payload["exit_code"] == exit_code
          search = json.loads(Path("search.json").read_text(encoding="utf-8"))
          assert any(item["name"] == "nmap" and item["version"] == "7.99" for item in search["matches"])
          help_payload = json.loads(Path("help.json").read_text(encoding="utf-8"))
          assert len(help_payload["matches"]) == 1
          descriptor = help_payload["matches"][0]
          assert descriptor["name"] == "jq" and descriptor["version"] == "1.6"
          assert descriptor["synopsis"] and descriptor["examples"]
          assert descriptor["selected_command"]["help_documents"]
          assert descriptor["selected_command"]["options"]
          catalog = json.loads(Path(f"toolbox-{__import__('os').environ['ARCHITECTURE']}.model-catalog.json").read_text(encoding="utf-8"))
          assert catalog["protocol"] == "nebula.toolbox.catalog/v2"
          names = [item["name"] for item in catalog["tools"]]
          assert len(names) == 27 and len(names) == len(set(names))
          assert all(item["coverage"]["complete"] for item in catalog["tools"])
          assert all(not item["coverage"]["unmapped_options"] for item in catalog["tools"])
          shell = json.loads(Path("shell.json").read_text(encoding="utf-8"))
          assert shell["stdout"].strip() == "2"
          assert shell["metadata"]["catalogued_guidance"] is False
          assert len(shell["metadata"]["script_sha256"]) == 64
          PY

          helper="nebula-egress-$ARCHITECTURE-$GITHUB_RUN_ID"
          trap 'docker rm -f "$helper" >/dev/null 2>&1 || true' EXIT
          docker run --detach --rm --platform "$platform" --name "$helper" \
            --read-only --cap-drop ALL --cap-add NET_ADMIN \
            --security-opt no-new-privileges --network bridge --user 0:0 \
            --tmpfs /run:rw,noexec,nosuid,nodev,size=4m \
            --entrypoint /usr/local/bin/nebula-egress "$reference" \
            serve --allow tcp://127.0.0.1:1
          for attempt in 1 2 3 4 5; do
            if docker logs "$helper" 2>&1 | grep -qx READY; then break; fi
            sleep 1
          done
          docker logs "$helper" 2>&1 | grep -qx READY
          docker stop --time 0 "$helper"
          trap - EXIT
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      - name: Sign image using GitHub OIDC identity
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Prepare release evidence
        run: install -d -m 0755 release-input
      - name: Generate CycloneDX SBOM
        env:
          SYFT_PLATFORM: linux/${{ matrix.architecture }}
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ${{ env.IMAGE }}@${{ steps.image.outputs.digest }}
          format: cyclonedx-json
          output-file: release-input/toolbox-${{ matrix.architecture }}.cdx.json
          upload-artifact: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}
      - name: Attest build provenance
        id: provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - name: Materialize release evidence
        env:
          BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          DIGEST: ${{ steps.image.outputs.digest }}
          ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          printf '%s\n' "$DIGEST" > "release-input/toolbox-$ARCHITECTURE.digest"
          install -m 0644 "toolbox-$ARCHITECTURE.model-catalog.json" \
            "release-input/toolbox-$ARCHITECTURE.model-catalog.json"
          python - "$BUNDLE" "release-input/toolbox-$ARCHITECTURE.intoto.jsonl" <<'PY'
          import base64, json, pathlib, sys
          bundle = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          envelope = bundle.get("dsseEnvelope") or bundle.get("dsse_envelope")
          if not isinstance(envelope, dict) or not isinstance(envelope.get("payload"), str):
              raise SystemExit("GitHub provenance bundle has no DSSE payload")
          statement = base64.b64decode(envelope["payload"], validate=True)
          parsed = json.loads(statement)
          if "in-toto.io/Statement/" not in str(parsed.get("_type", "")):
              raise SystemExit("GitHub provenance payload is not an in-toto statement")
          pathlib.Path(sys.argv[2]).write_bytes(statement + b"\n")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: toolbox-image-${{ matrix.architecture }}
          path: release-input
          if-no-files-found: error
          retention-days: 30

  catalog:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    environment: tool-pack-release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: toolbox-image-*
          path: release-input
          merge-multiple: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked catalog dependencies
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --without legacy,legacy-dev --with dev --no-interaction
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish the convenience multi-architecture tag
        run: |
          amd64="$(cat release-input/toolbox-amd64.digest)"
          arm64="$(cat release-input/toolbox-arm64.digest)"
          docker buildx imagetools create --tag "$IMAGE:$TOOLBOX_VERSION" "$IMAGE@$amd64" "$IMAGE@$arm64"
      - name: Require anonymous image access
        run: |
          docker logout ghcr.io
          for arch in amd64 arm64; do
            digest="$(cat "release-input/toolbox-$arch.digest")"
            if ! docker buildx imagetools inspect "$IMAGE@$digest" >/dev/null 2>&1; then
              {
                printf '### Nebula Toolbox is not publicly readable\n\n'
                printf 'Make [the GHCR package](https://github.com/orgs/%s/packages/container/nebula-toolbox/settings) public, then rerun failed jobs.\n' "$GITHUB_REPOSITORY_OWNER"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done
      - name: Assemble resolved release inputs
        run: |
          poetry run python -m scripts.compare_toolbox_interface_catalogs \
            --amd64 release-input/toolbox-amd64.model-catalog.json \
            --arm64 release-input/toolbox-arm64.model-catalog.json
          python - <<'PY'
          import hashlib, json, pathlib
          root = pathlib.Path("release-input")
          digests = {f"toolbox-{arch}": (root / f"toolbox-{arch}.digest").read_text().strip() for arch in ("amd64", "arm64")}
          (root / "digests.json").write_text(json.dumps(digests, indent=2, sort_keys=True) + "\n")
          catalog = root / "toolbox-amd64.model-catalog.json"
          (root / "interface-catalog.sha256").write_text(hashlib.sha256(catalog.read_bytes()).hexdigest() + "\n")
          PY
          install -d -m 0755 "$ENVIRONMENT_ROOT/sbom" "$ENVIRONMENT_ROOT/provenance"
          for arch in amd64 arm64; do
            install -m 0644 "release-input/toolbox-$arch.cdx.json" "$ENVIRONMENT_ROOT/sbom/toolbox-$arch.cdx.json"
            install -m 0644 "release-input/toolbox-$arch.intoto.jsonl" "$ENVIRONMENT_ROOT/provenance/toolbox-$arch.intoto.jsonl"
          done
      - name: Build and sign the catalog and environment bundle
        env:
          SIGNING_KEY: ${{ secrets.NEBULA_TOOL_PACK_SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY"
          umask 077
          printf '%s' "$SIGNING_KEY" > "$RUNNER_TEMP/toolbox-signing-key.pem"
          poetry run python -m scripts.build_tool_pack_catalog build \
            --source-root "$SOURCE_ROOT" \
            --output "$RUNNER_TEMP/toolbox-site" \
            --digests release-input/digests.json \
            --private-key "$RUNNER_TEMP/toolbox-signing-key.pem" \
            --key-id berylliumsec.2026 \
            --generated-at '${{ needs.prepare.outputs.generated_at }}' \
            --base-url https://berylliumsec.github.io/nebula/toolbox/ \
            --interface-catalog release-input/toolbox-amd64.model-catalog.json
          install -d -m 0755 "$RUNNER_TEMP/toolbox-site/model-catalogs"
          install -m 0644 release-input/*.model-catalog.json \
            "$RUNNER_TEMP/toolbox-site/model-catalogs/"
          rm -f "$RUNNER_TEMP/toolbox-signing-key.pem"
          diff -u "$SOURCE_ROOT/../trust/berylliumsec.json" "$RUNNER_TEMP/toolbox-site/berylliumsec-tool-pack-keys.json"
      - name: Verify signed publication payload
        run: |
          poetry run python - <<'PY'
          import json, os
          from pathlib import Path
          from nebula.v3.toolpacks import Ed25519Keyring, SignatureEnvelope, ToolCatalogV1, canonical_catalog_json
          site = Path(os.environ["RUNNER_TEMP"]) / "toolbox-site"
          keys = json.loads((site / "berylliumsec-tool-pack-keys.json").read_text())["keys"]
          catalog = ToolCatalogV1.model_validate_json((site / "catalog-v1.json").read_bytes())
          signature = SignatureEnvelope.model_validate_json((site / "catalog-v1.json.signature.json").read_bytes())
          Ed25519Keyring(keys).verify_publisher(canonical_catalog_json(catalog), signature, "berylliumsec")
          assert len(catalog.entries) == 1
          assert {entry.collection_id for entry in catalog.entries} == {"nebula-toolbox"}
          entry = catalog.entries[0]
          assert entry.tool_names == ["environment.help", "environment.run_invasive", "environment.run_local", "environment.run_network", "environment.search", "environment.shell_local", "environment.shell_network"]
          assert entry.interface_catalog_protocol == "nebula.toolbox.catalog/v2"
          assert entry.interface_tool_count == 27
          interface_path = site / "interfaces" / f"{entry.interface_catalog_digest}.json"
          assert interface_path.is_file()
          import hashlib
          assert hashlib.sha256(interface_path.read_bytes()).hexdigest() == entry.interface_catalog_digest
          PY
          (cd "$RUNNER_TEMP/toolbox-site" && sha256sum catalog-v1.json catalog-v1.json.signature.json bundles/* > SHA256SUMS)
      - name: Update durable Pages source
        run: |
          pages="$RUNNER_TEMP/gh-pages"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add "$pages" gh-pages
          else
            git worktree add --detach "$pages" HEAD
            (cd "$pages" && git checkout --orphan gh-pages && git rm -rf .)
          fi
          rm -rf "$pages/tool-packs" "$pages/toolbox"
          install -d -m 0755 "$pages/toolbox"
          cp -a "$RUNNER_TEMP/toolbox-site/." "$pages/toolbox/"
          touch "$pages/.nojekyll"
          if [ ! -f "$pages/index.html" ] \
            || grep -Fq 'Nebula signed release metadata.' "$pages/index.html" \
            || grep -Fq 'Nebula signed update manifests.' "$pages/index.html"; then
            install -m 0644 index.html "$pages/index.html"
          fi
          if [ ! -d "$pages/images" ]; then
            cp -a images "$pages/images"
          fi
          (
            cd "$pages"
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "Publish ${{ needs.prepare.outputs.release_ref }} Toolbox"
            git push origin HEAD:gh-pages
          )
          install -d -m 0755 "$RUNNER_TEMP/pages-upload"
          rsync -a --exclude=.git "$pages/" "$RUNNER_TEMP/pages-upload/"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-nebula-toolbox-${{ github.run_id }}
          path: ${{ runner.temp }}/toolbox-site
          if-no-files-found: error
          retention-days: 90
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ${{ runner.temp }}/pages-upload

  deploy:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, catalog]
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy signed Toolbox catalog
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
