name: Desktop release credential smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-credential-smoke
  cancel-in-progress: false

jobs:
  credentials:
    name: Verify signing and notarization credentials
    runs-on: macos-15
    environment: desktop-release
    timeout-minutes: 30
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      NEBULA_UPDATER_PUBLIC_KEY: ${{ secrets.NEBULA_UPDATER_PUBLIC_KEY }}
    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      - name: Reject missing and placeholder credentials
        shell: bash
        run: |
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            NEBULA_UPDATER_PUBLIC_KEY; do
            value="${!name:-}"
            test -n "$value" || { printf '%s is missing\n' "$name" >&2; exit 1; }
            case "$value" in
              PLACEHOLDER_REPLACE_BEFORE_RELEASE_*)
                printf '%s still contains a release placeholder\n' "$name" >&2
                exit 1
                ;;
            esac
          done

      - name: Install locked Tauri tooling
        run: npm --prefix ui ci

      - name: Import Developer ID certificate
        shell: bash
        env:
          CERTIFICATE_PATH: ${{ runner.temp }}/nebula-developer-id.p12
          KEYCHAIN_PATH: ${{ runner.temp }}/nebula-release-smoke.keychain-db
        run: |
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"], validate=True))'
          chmod 600 "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -F -- "\"$APPLE_SIGNING_IDENTITY\"" >/dev/null

      - name: Build, sign, and verify a disposable macOS application
        shell: bash
        run: |
          app="$RUNNER_TEMP/NebulaCredentialSmoke.app"
          executable="$app/Contents/MacOS/nebula-credential-smoke"
          plist="$app/Contents/Info.plist"
          source="$RUNNER_TEMP/nebula-credential-smoke.c"
          install -d -m 0755 "$app/Contents/MacOS"
          printf '%s\n' \
            '#include <stdio.h>' \
            'int main(void) {' \
            '  return puts("Nebula notarization credential smoke test") < 0;' \
            '}' \
            > "$source"
          xcrun clang -Os -Wall -Wextra -Werror "$source" -o "$executable"
          plutil -create xml1 "$plist"
          plutil -insert CFBundleExecutable -string nebula-credential-smoke "$plist"
          plutil -insert CFBundleIdentifier -string com.berylliumsec.nebula.credential-smoke "$plist"
          plutil -insert CFBundleName -string NebulaCredentialSmoke "$plist"
          plutil -insert CFBundlePackageType -string APPL "$plist"
          plutil -insert CFBundleShortVersionString -string 1.0.0 "$plist"
          plutil -insert CFBundleVersion -string 1 "$plist"
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Submit, staple, and validate disposable notarization
        shell: bash
        run: |
          app="$RUNNER_TEMP/NebulaCredentialSmoke.app"
          archive="$RUNNER_TEMP/NebulaCredentialSmoke.zip"
          response="$RUNNER_TEMP/notary-response.json"
          ditto -c -k --keepParent "$app" "$archive"
          xcrun notarytool submit "$archive" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 15m \
            --output-format json \
            > "$response"
          NOTARY_RESPONSE="$response" python3 -c 'import json, os; response = json.load(open(os.environ["NOTARY_RESPONSE"], encoding="utf-8")); status = response.get("status"); status == "Accepted" or (_ for _ in ()).throw(SystemExit(f"notarization status was {status!r}"))'
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"

      - name: Sign and verify a disposable updater payload
        shell: bash
        run: |
          printf 'Nebula updater credential smoke test\n' > "$RUNNER_TEMP/updater-smoke.bin"
          ui/node_modules/.bin/tauri signer sign "$RUNNER_TEMP/updater-smoke.bin"
          test -s "$RUNNER_TEMP/updater-smoke.bin.sig"
          cargo run \
            --locked \
            --quiet \
            --manifest-path ui/src-tauri/Cargo.toml \
            --example verify_update_signature \
            -- \
            "$RUNNER_TEMP/updater-smoke.bin" \
            "$RUNNER_TEMP/updater-smoke.bin.sig" \
            "$NEBULA_UPDATER_PUBLIC_KEY"
          printf 'tampered\n' >> "$RUNNER_TEMP/updater-smoke.bin"
          if cargo run \
            --locked \
            --quiet \
            --manifest-path ui/src-tauri/Cargo.toml \
            --example verify_update_signature \
            -- \
            "$RUNNER_TEMP/updater-smoke.bin" \
            "$RUNNER_TEMP/updater-smoke.bin.sig" \
            "$NEBULA_UPDATER_PUBLIC_KEY"; then
            printf 'tampered updater payload unexpectedly passed verification\n' >&2
            exit 1
          fi

      - name: Remove temporary credentials
        if: always()
        shell: bash
        env:
          CERTIFICATE_PATH: ${{ runner.temp }}/nebula-developer-id.p12
          KEYCHAIN_PATH: ${{ runner.temp }}/nebula-release-smoke.keychain-db
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf \
            "$CERTIFICATE_PATH" \
            "$RUNNER_TEMP/NebulaCredentialSmoke.app" \
            "$RUNNER_TEMP/NebulaCredentialSmoke.zip" \
            "$RUNNER_TEMP/nebula-credential-smoke.c" \
            "$RUNNER_TEMP/notary-response.json" \
            "$RUNNER_TEMP/updater-smoke.bin" \
            "$RUNNER_TEMP/updater-smoke.bin.sig"
