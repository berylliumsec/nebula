name: Finalize Nebula 3 desktop release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable nebula-v3.* release tag
        required: true
        type: string
      preparation_run_id:
        description: Successful Nebula 3 preparation workflow run ID
        required: true
        type: string
      create_draft:
        description: Create the complete draft GitHub Release after finalization
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: nebula3-finalize-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}
      - name: Validate tag and preparation run provenance
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PREPARATION_RUN_ID: ${{ inputs.preparation_run_id }}
        run: |
          case "$RELEASE_TAG" in
            nebula-v3.*) ;;
            *) printf 'invalid Nebula 3 release tag: %s\n' "$RELEASE_TAG" >&2; exit 1 ;;
          esac
          case "$PREPARATION_RUN_ID" in
            *[!0-9]*|'') printf 'invalid preparation run ID\n' >&2; exit 1 ;;
          esac
          version="${RELEASE_TAG#nebula-v}"
          python scripts/nebula3_version.py check --expected "$version"
          test -s "docs/releases/$version.md"
          test "$(git tag --points-at HEAD | grep -Fx "$RELEASE_TAG")" = "$RELEASE_TAG"
          commit="$(git rev-parse HEAD)"
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREPARATION_RUN_ID")"
          test "$(jq -r .conclusion <<<"$run")" = success
          test "$(jq -r .head_sha <<<"$run")" = "$commit"
          test "$(jq -r .path <<<"$run")" = .github/workflows/nebula3-release.yml
          artifacts="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREPARATION_RUN_ID/artifacts" --paginate --jq '.artifacts[].name')"
          for name in nebula3-macos-arm64 nebula3-linux-x64; do
            grep -Fx "$name" <<<"$artifacts" >/dev/null
          done
          case "$version" in *-*) prerelease=true ;; *) prerelease=false ;; esac
          {
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$version"
            printf 'prerelease=%s\n' "$prerelease"
            printf 'commit=%s\n' "$commit"
          } >> "$GITHUB_OUTPUT"

  finalize-macos:
    needs: validate
    environment: desktop-release
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            artifact_arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      NEBULA_VERSION: ${{ needs.validate.outputs.version }}
      NEBULA_UPDATER_PUBLIC_KEY: ${{ secrets.NEBULA_UPDATER_PUBLIC_KEY }}
    steps:
      - name: Check out the validated release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install the locked release inspection boundary
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --with dev --no-interaction
          npm --prefix ui ci
      - name: Download prepared macOS outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nebula3-${{ matrix.id }}
          path: ${{ runner.temp }}/release-stage
          github-token: ${{ github.token }}
          run-id: ${{ inputs.preparation_run_id }}
      - name: Import Apple Developer ID certificate
        env:
          CERTIFICATE_PATH: ${{ runner.temp }}/nebula-developer-id.p12
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          python -c 'import base64,os,pathlib; pathlib.Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))'
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" nebula-finalize.keychain
          security set-keychain-settings -lut 21600 nebula-finalize.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" nebula-finalize.keychain
          security import "$CERTIFICATE_PATH" -k nebula-finalize.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" nebula-finalize.keychain
          security list-keychains -d user -s nebula-finalize.keychain login.keychain-db
      - name: Staple accepted apps and rebuild signed installers
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          stage="$RUNNER_TEMP/release-stage"
          for flavor in direct managed; do
            dmg="$stage/Nebula-$NEBULA_VERSION-macOS-${{ matrix.artifact_arch }}-$flavor.dmg"
            test -s "$dmg"
            writable="$RUNNER_TEMP/Nebula-$flavor-writable.dmg"
            rebuilt="$RUNNER_TEMP/Nebula-$flavor-final.dmg"
            hdiutil convert "$dmg" -format UDRW -o "$writable"
            mount="$RUNNER_TEMP/mount-$flavor"
            install -d -m 0755 "$mount"
            hdiutil attach "$writable" -mountpoint "$mount" -nobrowse
            app="$mount/Nebula.app"
            test -x "$app/Contents/MacOS/nebula-ui"
            test -x "$app/Contents/MacOS/nebula-core"
            xcrun stapler staple "$app"
            xcrun stapler validate "$app"
            poetry run python scripts/package_audit.py --tree "$app"
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=2 "$app"
            "$app/Contents/MacOS/nebula-ui" --self-test
            if [ "$flavor" = direct ]; then
              updater="$stage/Nebula-$NEBULA_VERSION-macOS-${{ matrix.artifact_arch }}.updater.tar.gz"
              COPYFILE_DISABLE=1 tar -czf "$updater" -C "$mount" Nebula.app
              npm --prefix ui run tauri -- signer sign "$updater"
            fi
            hdiutil detach "$mount"
            hdiutil convert "$writable" -format UDZO -o "$rebuilt"
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$rebuilt"
            mv "$rebuilt" "$dmg"
            codesign --verify --deep --strict --verbose=2 "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"
          done
      - name: Verify updater signatures
        run: |
          updater="$RUNNER_TEMP/release-stage/Nebula-$NEBULA_VERSION-macOS-${{ matrix.artifact_arch }}.updater.tar.gz"
          test -s "$updater"
          test -s "$updater.sig"
          cargo run --locked --quiet --manifest-path ui/src-tauri/Cargo.toml \
            --example verify_update_signature -- \
            "$updater" "$updater.sig" "$NEBULA_UPDATER_PUBLIC_KEY"
          tampered="$RUNNER_TEMP/tampered-updater.tar.gz"
          cp "$updater" "$tampered"
          printf 'tampered' >> "$tampered"
          if cargo run --locked --quiet --manifest-path ui/src-tauri/Cargo.toml \
            --example verify_update_signature -- \
            "$tampered" "$updater.sig" "$NEBULA_UPDATER_PUBLIC_KEY"; then
            printf 'tampered updater unexpectedly passed signature verification\n' >&2
            exit 1
          fi
      - name: Generate final macOS SBOMs and checksums
        run: |
          stage="$RUNNER_TEMP/release-stage"
          for artifact in "$stage"/Nebula-*; do
            case "$artifact" in *.sig|*.json) continue ;; esac
            direct=
            case "$artifact" in *-direct.dmg|*.updater.tar.gz) direct=--direct ;; esac
            poetry run python -m scripts.generate_release_sbom \
              --artifact "$artifact" \
              --root "$GITHUB_WORKSPACE" \
              --target "${{ matrix.target }}" \
              $direct
          done
          (
            cd "$stage"
            shasum -a 256 Nebula-* > "SHA256SUMS-${{ matrix.id }}.txt"
          )
      - name: Attest finalized macOS artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ runner.temp }}/release-stage/*
      - name: Upload finalized macOS outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nebula3-final-${{ matrix.id }}
          path: ${{ runner.temp }}/release-stage/*
          if-no-files-found: error
      - name: Remove temporary Apple keychain
        if: always()
        run: security delete-keychain nebula-finalize.keychain || true

  draft-release:
    needs: [validate, finalize-macos]
    if: inputs.create_draft == true
    runs-on: ubuntu-22.04
    environment: desktop-release
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out the validated release notes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Download prepared Linux outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nebula3-linux-x64
          path: release-assets
          github-token: ${{ github.token }}
          run-id: ${{ inputs.preparation_run_id }}
      - name: Download finalized macOS outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nebula3-final-*
          path: release-assets
          merge-multiple: true
      - name: Verify the complete immutable artifact set
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          required="
          Nebula-$VERSION-macOS-arm64-direct.dmg
          Nebula-$VERSION-macOS-arm64-managed.dmg
          Nebula-$VERSION-linux-x86_64.deb
          Nebula-$VERSION-linux-x86_64.AppImage
          Nebula-$VERSION-linux-x86_64.AppImage.sig
          Nebula-$VERSION-macOS-arm64.updater.tar.gz
          Nebula-$VERSION-macOS-arm64.updater.tar.gz.sig
          "
          for name in $required; do test -s "release-assets/$name"; done
          test "$(find release-assets -maxdepth 1 -type f -name '*.cyclonedx.json' | wc -l)" -eq 5
          test "$(find release-assets -maxdepth 1 -type f -name '*.spdx.json' | wc -l)" -eq 5
          test "$(find release-assets -maxdepth 1 -type f -name 'SHA256SUMS-*' | wc -l)" -eq 2
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path("release-assets").glob("*.cyclonedx.json"):
              payload = json.loads(path.read_text())
              assert payload.get("bomFormat") == "CycloneDX", path
              assert len(payload.get("components", [])) >= 10, path
          for path in Path("release-assets").glob("*.spdx.json"):
              payload = json.loads(path.read_text())
              assert payload.get("spdxVersion") == "SPDX-2.3", path
              assert len(payload.get("packages", [])) >= 10, path
          PY
      - name: Create a manually reviewed draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            printf 'release already exists for %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi
          prerelease_flag=
          if [ "$PRERELEASE" = true ]; then prerelease_flag=--prerelease; fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --verify-tag \
            --draft \
            $prerelease_flag \
            --notes-file "docs/releases/$VERSION.md" \
            --title "Nebula $VERSION"
