# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "images/**"
      - ".github/workflows/static.yml"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "nebula-pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the website source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
      - name: Update the durable Pages website
        run: |
          pages="$RUNNER_TEMP/gh-pages"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add "$pages" gh-pages
          else
            git worktree add --detach "$pages" HEAD
            (
              cd "$pages"
              git checkout --orphan gh-pages
              git rm -rf .
            )
          fi
          install -m 0644 index.html "$pages/index.html"
          rm -rf "$pages/images"
          cp -a images "$pages/images"
          touch "$pages/.nojekyll"
          (
            cd "$pages"
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .nojekyll index.html images
            if ! git diff --cached --quiet; then
              git commit -m "Publish Nebula website"
              git push origin HEAD:gh-pages
            fi
          )
          install -d -m 0755 "$RUNNER_TEMP/pages-upload"
          rsync -a --exclude=.git "$pages/" "$RUNNER_TEMP/pages-upload/"
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ runner.temp }}/pages-upload
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
