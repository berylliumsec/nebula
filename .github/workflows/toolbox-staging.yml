name: Build Nebula Toolbox Staging Bundle

on:
  push:
    branches: [nebula-3-modernization]
    paths:
      - ".github/workflows/toolbox-staging.yml"
      - "docs/TOOLBOX-STAGING.md"
      - "poetry.lock"
      - "pyproject.toml"
      - "scripts/build_toolbox_staging_bundle.py"
      - "scripts/smoke_test_toolbox_image.sh"
      - "src/nebula/v3/tool_pack_assets/toolbox/**"
      - "src/nebula/v3/tool_interfaces.py"
      - "src/nebula/v3/toolpack_sdk.py"
      - "src/nebula/v3/toolpacks.py"

permissions:
  contents: read
  packages: write

concurrency:
  group: toolbox-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/berylliumsec/nebula-toolbox-staging
  TOOLBOX_VERSION: 0.1.0
  ENVIRONMENT_ROOT: src/nebula/v3/tool_pack_assets/toolbox/environment

jobs:
  build:
    name: Build and test ${{ matrix.architecture }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push staging platform image
        id: image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ env.ENVIRONMENT_ROOT }}
          file: ${{ env.ENVIRONMENT_ROOT }}/Containerfile
          platforms: linux/${{ matrix.architecture }}
          push: true
          pull: true
          no-cache: true
          tags: ${{ env.IMAGE }}:git-${{ github.sha }}-${{ matrix.architecture }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.TOOLBOX_VERSION }}.dev${{ github.run_number }}
            org.opencontainers.image.title=Nebula Toolbox staging
      - name: Run the release-equivalent smoke tests
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          output="$RUNNER_TEMP/toolbox-$ARCHITECTURE"
          bash scripts/smoke_test_toolbox_image.sh \
            "$IMAGE@$DIGEST" \
            "linux/$ARCHITECTURE" \
            "$output" \
            "$ENVIRONMENT_ROOT/tool-versions.env"
          mkdir -p release-input
          printf '%s\n' "$DIGEST" > "release-input/toolbox-$ARCHITECTURE.digest"
          install -m 0644 "$output/model-catalog.json" \
            "release-input/toolbox-$ARCHITECTURE.model-catalog.json"
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: toolbox-staging-image-${{ matrix.architecture }}
          path: release-input
          if-no-files-found: error
          retention-days: 14

  bundle:
    name: Assemble Mac-installable bundle
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: toolbox-staging-image-*
          path: release-input
          merge-multiple: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked bundle dependencies
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --without legacy,legacy-dev --with dev --no-interaction
      - name: Require architecture-independent command interfaces
        run: |
          cmp release-input/toolbox-amd64.model-catalog.json \
            release-input/toolbox-arm64.model-catalog.json
      - name: Build unsigned staging tool pack
        env:
          STAGING_VERSION: 0.1.0.dev${{ github.run_number }}
        run: |
          mkdir -p staging-artifact
          poetry run python -m scripts.build_toolbox_staging_bundle \
            --source-root "$ENVIRONMENT_ROOT" \
            --output staging-artifact/nebula-toolbox-staging.nebula-toolpack \
            --image-registry "$IMAGE" \
            --amd64-digest "$(cat release-input/toolbox-amd64.digest)" \
            --arm64-digest "$(cat release-input/toolbox-arm64.digest)" \
            --interface-catalog release-input/toolbox-amd64.model-catalog.json \
            --version "$STAGING_VERSION" \
            --source-revision "$GITHUB_SHA" \
            > staging-artifact/bundle.json
          cp docs/TOOLBOX-STAGING.md staging-artifact/README.md
          (
            cd staging-artifact
            sha256sum nebula-toolbox-staging.nebula-toolpack > SHA256SUMS
          )
      - name: Summarize the staging artifact
        run: |
          {
            printf '### Nebula Toolbox staging bundle\n\n'
            printf 'Download artifact `%s`, authenticate Docker/Podman to GHCR if the package is private, and follow `README.md`.\n\n' \
              "nebula-toolbox-staging-$GITHUB_RUN_ID"
            printf 'This run did not sign or publish the official Toolbox catalog.\n'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: nebula-toolbox-staging-${{ github.run_id }}
          path: staging-artifact
          if-no-files-found: error
          retention-days: 14
