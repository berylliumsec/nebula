name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Poetry
        run: python -m pip install "poetry==2.1.3"
      - name: Validate package metadata
        run: poetry check
      - name: Install project
        run: poetry install --no-interaction
      - name: Test
        run: poetry run pytest -q
      - name: Lint Nebula 3
        run: poetry run ruff check src/nebula/v3 tests/v3
      - name: Build distributions
        run: poetry build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test
      - run: npm run build

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: python -m pip install "poetry==2.1.3"
      - run: poetry install --no-interaction --with dev
      - run: npm --prefix ui ci
      - run: npm --prefix ui run build
      - run: poetry run python scripts/build_nebula_core.py
      - name: Smoke test frozen Core sidecar
        run: |
          sidecar="$(find ui/src-tauri/binaries -maxdepth 1 -type f -name 'nebula-core-*' -print -quit)"
          test -n "$sidecar"
          test -x "$sidecar"
          "$sidecar" doctor --data-dir "$RUNNER_TEMP/nebula-sidecar-smoke"
      - run: cargo check --locked --manifest-path ui/src-tauri/Cargo.toml

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --pull=false -f Dockerfile.v3 -t nebula-v3:ci .
      - name: Smoke test non-root Core
        run: |
          docker run -d --name nebula-v3-ci -e NEBULA_V3_API_TOKEN=test-token -p 127.0.0.1:18000:8000 nebula-v3:ci
          trap 'docker rm -f nebula-v3-ci' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:18000/api/v1/health && exit 0
            sleep 1
          done
          docker logs nebula-v3-ci
          exit 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: nebula.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: nebula.spdx.json
