name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Poetry
        run: python -m pip install "poetry==2.1.3"
      - name: Validate package metadata
        run: poetry check
      - name: Install project
        run: poetry install --no-interaction
      - name: Test
        run: poetry run pytest -q
      - name: Lint Nebula 3
        run: poetry run ruff check src/nebula/v3 tests/v3
      - name: Check Nebula 3 formatting
        run: poetry run ruff format --check src/nebula/v3 tests/v3
      - name: Type-check Nebula 3
        if: matrix.python-version == '3.12'
        run: poetry run mypy src/nebula/v3
      - name: Validate Safe Foundation release source
        if: matrix.python-version == '3.12'
        run: poetry run python -m scripts.validate_tool_pack_release --json
      - name: Build distributions
        run: poetry build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test
      - run: npm run build

  desktop:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - name: Set deterministic QA build identity
        run: |
          printf 'NEBULA_BUILD_COMMIT=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          printf 'NEBULA_BUILD_TARGET=%s\n' "$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_ENV"
          printf 'NEBULA_BUILD_TIMESTAMP=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          printf 'NEBULA_DISTRIBUTION_CHANNEL=managed\n' >> "$GITHUB_ENV"
          printf 'NEBULA_DISTRIBUTION=managed\n' >> "$GITHUB_ENV"
      - name: Install Tauri system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb
      - run: python -m pip install "poetry==2.1.3"
      - run: poetry install --without legacy,legacy-dev --with dev --no-interaction
      - run: python scripts/nebula3_version.py check
      - run: poetry run pytest -q --confcutdir=tests/v3 tests/v3
      - run: poetry run pytest -q packaging/updater/test_generate_manifest.py
      - run: npm --prefix ui ci
      - run: npm --prefix ui run build
      - run: poetry run python -m scripts.build_nebula_core
      - name: Smoke test frozen Core sidecar
        run: |
          sidecar="$(find ui/src-tauri/binaries -maxdepth 1 -type f -name 'nebula-core-*' -print -quit)"
          test -n "$sidecar"
          test -x "$sidecar"
          "$sidecar" doctor --data-dir "$RUNNER_TEMP/nebula-sidecar-smoke"
          poetry run python scripts/package_audit.py "$sidecar"
      - name: Test managed desktop shell
        run: cargo test --locked --manifest-path ui/src-tauri/Cargo.toml
      - name: Compile direct updater boundary
        env:
          NEBULA_UPDATE_CHANNEL: prerelease
          NEBULA_UPDATE_ENDPOINT: https://example.invalid/updates/prerelease/latest.json
          NEBULA_UPDATER_PUBLIC_KEY: RWQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: cargo test --locked --features direct-updater --manifest-path ui/src-tauri/Cargo.toml
      - name: Build managed DEB installer
        env:
          NEBULA_DISTRIBUTION: managed
        run: npm --prefix ui run tauri -- build --ci --bundles deb --config src-tauri/tauri.managed.conf.json
      - name: Normalize Debian prerelease ordering
        run: |
          deb="$(find ui/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print -quit)"
          poetry run python -m scripts.repack_deb "$deb" --version "$(cat NEBULA3_VERSION)"
      - name: Inspect and self-test installed layout
        run: |
          deb="$(find ui/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$deb"
          dpkg-deb --info "$deb"
          expected="$(poetry run python -c 'from pathlib import Path; from scripts.repack_deb import debian_version; print(debian_version(Path("NEBULA3_VERSION").read_text().strip()))')"
          test "$(dpkg-deb --field "$deb" Version)" = "$expected"
          dpkg-deb --extract "$deb" "$RUNNER_TEMP/nebula-deb"
          test -x "$RUNNER_TEMP/nebula-deb/usr/bin/nebula"
          test -x "$RUNNER_TEMP/nebula-deb/usr/bin/nebula-core"
          test -x "$RUNNER_TEMP/nebula-deb/usr/bin/nebula-ui"
          poetry run python scripts/package_audit.py --tree "$RUNNER_TEMP/nebula-deb"
          xvfb-run -a "$RUNNER_TEMP/nebula-deb/usr/bin/nebula-ui" --self-test
          xvfb-run -a poetry run python scripts/test_desktop_crash_cleanup.py "$RUNNER_TEMP/nebula-deb/usr/bin/nebula-ui"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: docker build --pull=false -f Dockerfile.v3 -t nebula-v3:ci .
      - name: Smoke test non-root Core
        run: |
          docker run -d --name nebula-v3-ci -e NEBULA_V3_API_TOKEN=test-token -p 127.0.0.1:18000:8000 nebula-v3:ci
          trap 'docker rm -f nebula-v3-ci' EXIT
          for attempt in {1..30}; do
            curl --fail --silent --header 'Authorization: Bearer test-token' http://127.0.0.1:18000/api/v1/health && exit 0
            sleep 1
          done
          docker logs nebula-v3-ci
          exit 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: anchore/sbom-action@fbfd9c6c189226748411491745178e0c2017392d # v0.20.10
        with:
          path: .
          format: spdx-json
          output-file: nebula.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: nebula.spdx.json
