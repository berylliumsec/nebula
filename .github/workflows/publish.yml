name: Nebula 2 legacy release

on:
  push:
    tags:
      - "nebula2-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing nebula2-v* tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nebula2-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref_name }}
      - name: Validate the tag and package version
        id: version
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            nebula2-v*) ;;
            *) printf 'invalid Nebula 2 release tag: %s\n' "$RELEASE_TAG" >&2; exit 1 ;;
          esac
          version="${RELEASE_TAG#nebula2-v}"
          package_version="$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["tool"]["poetry"]["version"])')"
          test "$version" = "$package_version"
          test "$(git tag --points-at HEAD | grep -Fx "$RELEASE_TAG")" = "$RELEASE_TAG"
          printf 'tag=%s\nversion=%s\n' "$RELEASE_TAG" "$version" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install locked project
        run: |
          python -m pip install "poetry==2.1.3"
          poetry check
          poetry install --with dev --no-interaction
      - name: Test legacy application
        env:
          QT_QPA_PLATFORM: offscreen
        run: poetry run pytest -q
      - name: Build wheel and source archive
        run: poetry build
      - name: Upload immutable distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nebula2-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    environment: nebula2-release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download the tested distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nebula2-${{ needs.build.outputs.version }}
          path: dist
      - name: Publish to PyPI using trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      - name: Publish the tagged GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes --title "Nebula ${{ needs.build.outputs.version }}"
