name: Publish Safe Foundation tool packs

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Immutable nebula-tools-v* tag, or a ref for source validation
        required: true
        default: main
        type: string
      mode:
        description: Validate source or publish a protected release
        required: true
        default: validate-source
        type: choice
        options: [validate-source, publish]
  push:
    tags: ["nebula-tools-v*"]

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write
  pages: write

concurrency:
  group: tool-pack-publication-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/berylliumsec/nebula-tools
  PACK_VERSION: 0.1.0
  SOURCE_ROOT: src/nebula/v3/tool_pack_assets/safe_foundation
  KALI_BASE: kalilinux/kali-last-release@sha256:338e058ffff77cd47f02e1b98696c2f89d924ecf9c177aab63ae4ec405e951cd

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      release_ref: ${{ steps.release.outputs.release_ref }}
      generated_at: ${{ steps.release-time.outputs.generated_at }}
      nmap_version: ${{ steps.packages.outputs.nmap_version }}
      exploitdb_version: ${{ steps.packages.outputs.exploitdb_version }}
    steps:
      - name: Resolve and validate release input
        id: release
        env:
          DISPATCH_REF: ${{ inputs.release_ref }}
          DISPATCH_MODE: ${{ inputs.mode }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = push ]; then
            release_ref="$GITHUB_REF_NAME"
            publish=true
          else
            release_ref="$DISPATCH_REF"
            if [ "$DISPATCH_MODE" = publish ]; then publish=true; else publish=false; fi
          fi
          if [ "$publish" = true ]; then
            case "$release_ref" in nebula-tools-v*) ;; *) printf 'publishing requires nebula-tools-v*\n' >&2; exit 1 ;; esac
          fi
          printf 'publish=%s\nrelease_ref=%s\n' "$publish" "$release_ref" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.release_ref }}
      - name: Require an immutable publication tag
        if: steps.release.outputs.publish == 'true'
        run: |
          git show-ref --verify --quiet "refs/tags/${{ steps.release.outputs.release_ref }}"
          test "$(git rev-list -n 1 "${{ steps.release.outputs.release_ref }}")" = "$(git rev-parse HEAD)"
          printf 'generated_at=%s\n' "$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
        id: timestamp
      - name: Forward deterministic timestamp
        id: release-time
        run: |
          if [ "${{ steps.release.outputs.publish }}" = true ]; then
            value="${{ steps.timestamp.outputs.generated_at }}"
          else
            value="$(git show -s --format=%cI HEAD)"
          fi
          printf 'generated_at=%s\n' "$value" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked validation boundary
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --without legacy,legacy-dev --with dev --no-interaction
      - name: Validate Safe Foundation sources
        run: poetry run python -m scripts.validate_tool_pack_release --json > tool-pack-readiness.json
      - name: Resolve exact Kali package versions
        if: steps.release.outputs.publish == 'true'
        id: packages
        run: |
          docker pull "$KALI_BASE"
          versions="$(docker run --rm "$KALI_BASE" bash -euc '
            apt-get update >/dev/null
            nmap_version=$(apt-cache policy nmap | awk "/Candidate:/ {print \$2}")
            exploitdb_version=$(apt-cache policy exploitdb | awk "/Candidate:/ {print \$2}")
            test -n "$nmap_version" -a "$nmap_version" != "(none)"
            test -n "$exploitdb_version" -a "$exploitdb_version" != "(none)"
            printf "%s\n%s\n" "$nmap_version" "$exploitdb_version"
          ')"
          printf 'nmap_version=%s\n' "$(printf '%s\n' "$versions" | sed -n '1p')" >> "$GITHUB_OUTPUT"
          printf 'exploitdb_version=%s\n' "$(printf '%s\n' "$versions" | sed -n '2p')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tool-pack-readiness-${{ github.run_id }}
          path: tool-pack-readiness.json
          retention-days: 30

  build:
    if: needs.prepare.outputs.publish == 'true'
    needs: prepare
    runs-on: ubuntu-22.04
    environment: tool-pack-release
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
        component:
          - name: nmap
            context: network
            file: Containerfile
            licenses: Nmap
          - name: nuclei
            context: web
            file: Containerfile.nuclei
            licenses: MIT
          - name: nikto
            context: web
            file: Containerfile.nikto
            licenses: GPL-2.0-only
          - name: searchsploit
            context: intelligence
            file: Containerfile
            licenses: GPL-2.0-only
          - name: semgrep
            context: code
            file: Containerfile
            licenses: LGPL-2.1-or-later
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Select exact build arguments
        run: |
          case '${{ matrix.component.name }}' in
            nmap) printf 'BUILD_ARGS=NMAP_VERSION=%s\n' '${{ needs.prepare.outputs.nmap_version }}' >> "$GITHUB_ENV" ;;
            searchsploit) printf 'BUILD_ARGS=EXPLOITDB_VERSION=%s\n' '${{ needs.prepare.outputs.exploitdb_version }}' >> "$GITHUB_ENV" ;;
            *) printf 'BUILD_ARGS=\n' >> "$GITHUB_ENV" ;;
          esac
      - name: Build and push immutable platform image
        id: image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ env.SOURCE_ROOT }}/${{ matrix.component.context }}
          file: ${{ env.SOURCE_ROOT }}/${{ matrix.component.context }}/${{ matrix.component.file }}
          platforms: linux/${{ matrix.architecture }}
          push: true
          pull: true
          no-cache: true
          build-args: ${{ env.BUILD_ARGS }}
          tags: ${{ env.REGISTRY }}/${{ matrix.component.name }}:${{ env.PACK_VERSION }}-${{ matrix.architecture }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.PACK_VERSION }}
            org.opencontainers.image.licenses=${{ matrix.component.licenses }}
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      - name: Sign image using GitHub OIDC identity
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.component.name }}
          DIGEST: ${{ steps.image.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Prepare release evidence directory
        run: install -d -m 0755 release-input
      - name: Generate CycloneDX SBOM
        env:
          SYFT_PLATFORM: linux/${{ matrix.architecture }}
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ${{ env.REGISTRY }}/${{ matrix.component.name }}@${{ steps.image.outputs.digest }}
          format: cyclonedx-json
          output-file: release-input/${{ matrix.component.name }}-${{ matrix.architecture }}.cdx.json
          upload-artifact: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}
      - name: Attest build provenance
        id: provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.component.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - name: Materialize release evidence
        env:
          BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          DIGEST: ${{ steps.image.outputs.digest }}
          COMPONENT: ${{ matrix.component.name }}
          ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          printf '%s\n' "$DIGEST" > "release-input/$COMPONENT-$ARCHITECTURE.digest"
          python - "$BUNDLE" "release-input/$COMPONENT-$ARCHITECTURE.intoto.jsonl" <<'PY'
          import base64, json, pathlib, sys
          bundle = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          envelope = bundle.get("dsseEnvelope") or bundle.get("dsse_envelope")
          if not isinstance(envelope, dict) or not isinstance(envelope.get("payload"), str):
              raise SystemExit("GitHub provenance bundle has no DSSE payload")
          statement = base64.b64decode(envelope["payload"], validate=True)
          parsed = json.loads(statement)
          if "in-toto.io/Statement/" not in str(parsed.get("_type", "")):
              raise SystemExit("GitHub provenance payload is not an in-toto statement")
          pathlib.Path(sys.argv[2]).write_bytes(statement + b"\n")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safe-image-${{ matrix.component.name }}-${{ matrix.architecture }}
          path: release-input
          if-no-files-found: error
          retention-days: 30

  catalog:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    environment: tool-pack-release
    outputs:
      pages_path: ${{ steps.pages.outputs.path }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: safe-image-*
          path: release-input
          merge-multiple: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked catalog builder
        run: |
          python -m pip install "poetry==2.1.3"
          poetry install --without legacy,legacy-dev --with dev --no-interaction
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create convenience multi-architecture tags
        run: |
          for component in nmap nuclei nikto searchsploit semgrep; do
            amd64="$(cat "release-input/$component-amd64.digest")"
            arm64="$(cat "release-input/$component-arm64.digest")"
            docker buildx imagetools create \
              --tag "$REGISTRY/$component:$PACK_VERSION" \
              "$REGISTRY/$component@$amd64" "$REGISTRY/$component@$arm64"
          done
      - name: Require anonymous image access before catalog publication
        run: |
          docker logout ghcr.io
          failed=()
          for component in nmap nuclei nikto searchsploit semgrep; do
            for arch in amd64 arm64; do
              digest="$(cat "release-input/$component-$arch.digest")"
              if ! docker buildx imagetools inspect "$REGISTRY/$component@$digest" >/dev/null 2>&1; then
                failed+=("$component ($arch)")
              fi
            done
          done
          if [ "${#failed[@]}" -ne 0 ]; then
            {
              printf '### GHCR packages are not publicly readable\n\n'
              printf 'The images were built and pushed, but GitHub creates new container packages as private. '
              printf 'An organization owner must make each component public once before the signed catalog can be published.\n\n'
              for component in nmap nuclei nikto searchsploit semgrep; do
                printf -- '- [%s package settings](https://github.com/orgs/%s/packages/container/package/nebula-tools%%2F%s/settings)\n' \
                  "$component" "$GITHUB_REPOSITORY_OWNER" "$component"
              done
              printf '\nAfter changing **Danger Zone → Change visibility → Public**, rerun only the failed jobs:\n\n'
              printf '```bash\ngh run rerun %s --failed\n```\n' "$GITHUB_RUN_ID"
              printf '\nFailed anonymous checks: `%s`\n' "${failed[*]}"
            } >> "$GITHUB_STEP_SUMMARY"
            printf '::error title=GHCR packages are private::Make the five Safe Foundation packages public using the links in the job summary, then rerun failed jobs.\n'
            exit 1
          fi
      - name: Assemble resolved release inputs
        run: |
          python - <<'PY'
          import json, pathlib
          root = pathlib.Path("release-input")
          result = {}
          for component in ("nmap", "nuclei", "nikto", "searchsploit", "semgrep"):
              for arch in ("amd64", "arm64"):
                  result[f"{component}-{arch}"] = (root / f"{component}-{arch}.digest").read_text().strip()
          (root / "digests.json").write_text(json.dumps(result, indent=2, sort_keys=True) + "\n")
          PY
          for specification in \
            'network nmap' \
            'web nuclei' \
            'web nikto' \
            'intelligence searchsploit' \
            'code semgrep'; do
            set -- $specification
            pack=$1
            component=$2
            install -d -m 0755 "$SOURCE_ROOT/$pack/sbom" "$SOURCE_ROOT/$pack/provenance"
            for arch in amd64 arm64; do
              install -m 0644 "release-input/$component-$arch.cdx.json" "$SOURCE_ROOT/$pack/sbom/$component-$arch.cdx.json"
              install -m 0644 "release-input/$component-$arch.intoto.jsonl" "$SOURCE_ROOT/$pack/provenance/$component-$arch.intoto.jsonl"
            done
          done
      - name: Build and sign catalog and deterministic bundles
        env:
          SIGNING_KEY: ${{ secrets.NEBULA_TOOL_PACK_SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY"
          umask 077
          printf '%s' "$SIGNING_KEY" > "$RUNNER_TEMP/tool-pack-signing-key.pem"
          poetry run python -m scripts.build_tool_pack_catalog build \
            --source-root "$SOURCE_ROOT" \
            --output "$RUNNER_TEMP/tool-pack-site" \
            --digests release-input/digests.json \
            --private-key "$RUNNER_TEMP/tool-pack-signing-key.pem" \
            --key-id berylliumsec.2026 \
            --generated-at '${{ needs.prepare.outputs.generated_at }}' \
            --base-url https://berylliumsec.github.io/nebula/tool-packs/
          rm -f "$RUNNER_TEMP/tool-pack-signing-key.pem"
          diff -u "$SOURCE_ROOT/../trust/berylliumsec.json" "$RUNNER_TEMP/tool-pack-site/berylliumsec-tool-pack-keys.json"
      - name: Verify published payload before deployment
        run: |
          poetry run python - <<'PY'
          import asyncio, json
          from pathlib import Path
          from nebula.v3.toolpacks import Ed25519Keyring, SignatureEnvelope, ToolCatalogV1, canonical_catalog_json
          site = Path("${{ runner.temp }}/tool-pack-site")
          keys = json.loads((site / "berylliumsec-tool-pack-keys.json").read_text())["keys"]
          catalog = ToolCatalogV1.model_validate_json((site / "catalog-v1.json").read_bytes())
          signature = SignatureEnvelope.model_validate_json((site / "catalog-v1.json.signature.json").read_bytes())
          Ed25519Keyring(keys).verify_publisher(canonical_catalog_json(catalog), signature, "berylliumsec")
          assert len(catalog.entries) == 4
          assert {entry.collection_id for entry in catalog.entries} == {"safe-foundation"}
          PY
          (cd "$RUNNER_TEMP/tool-pack-site" && sha256sum catalog-v1.json catalog-v1.json.signature.json bundles/* > SHA256SUMS)
      - name: Update durable Pages source
        id: pages
        run: |
          pages="$RUNNER_TEMP/gh-pages"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add "$pages" gh-pages
          else
            git worktree add --detach "$pages" HEAD
            (cd "$pages" && git checkout --orphan gh-pages && git rm -rf .)
          fi
          rm -rf "$pages/tool-packs"
          install -d -m 0755 "$pages/tool-packs"
          cp -a "$RUNNER_TEMP/tool-pack-site/." "$pages/tool-packs/"
          touch "$pages/.nojekyll"
          if [ ! -f "$pages/index.html" ]; then
            printf '<!doctype html><title>Nebula releases</title><p>Nebula signed release metadata.</p>\n' > "$pages/index.html"
          fi
          (
            cd "$pages"
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .nojekyll index.html tool-packs
            git commit -m "Publish ${{ needs.prepare.outputs.release_ref }} Safe Foundation"
            git push origin HEAD:gh-pages
          )
          install -d -m 0755 "$RUNNER_TEMP/pages-upload"
          rsync -a --exclude=.git "$pages/" "$RUNNER_TEMP/pages-upload/"
          printf 'path=%s\n' "$RUNNER_TEMP/pages-upload" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-safe-foundation-${{ github.run_id }}
          path: ${{ runner.temp }}/tool-pack-site
          if-no-files-found: error
          retention-days: 90
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ${{ runner.temp }}/pages-upload

  deploy:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, catalog]
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy signed Safe Foundation catalog
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
