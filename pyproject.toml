[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"
include = [ "src/nebula/images/*", "src/nebula/Images_readme/*", "src/nebula/command_search_index/*", "src/nebula/config/*",]

[tool.poetry]
name = "nebula-ai"
version = "2.0.0b25"
description = "AI-Powered Ethical Hacking Assistant"
readme = "README.md"
authors = [ "David I <david@berylliumsec.com>",]
license = "BSD"
homepage = "https://github.com/berylliumsec/nebula"
keywords = [ "AI", "ethical hacking", "nmap", "zap", "crackmapexec",]
classifiers = [ "Development Status :: 4 - Beta", "Intended Audience :: Developers", "License :: OSI Approved :: BSD License", "Programming Language :: Python :: 3",]
include = [ "src/nebula/images/*",]
[[tool.poetry.packages]]
include = "nebula"
from = "src"

[tool.poetry.scripts]
nebula = "nebula.nebula:main"

[tool.poetry.dependencies]
python = ">=3.10,<=3.13.9"
Cython = "*"
IPython = ">=8,<9"
PyQt6 = "*"
boto3 = "*"
opencv-python = "*"
Faker = "*"
numpy = ">=1.26,<2"
prompt_toolkit = "*"
psutil = "*"
Pygments = "*"
requests = "*"
tiktoken = "*"
torch = "*"
transformers = "*"
websockets = "*"
Whoosh = "*"
fastapi = "*"
uvicorn = "*"
pydantic = "*"
langchain = "*"
regex = "*"
typing-extensions = "*"
langchain-community = "0.3.16"
langchain-core = "*"
accelerate = "*"
duckduckgo-search = "*"
toml = "*"
setuptools = "*"
langchain-experimental = "*"
ollama = "*"
langchain_ollama = "*"
langchain_openai = "*"
langchain-huggingface = "*"
sentence-transformers = "*"
chromadb = "*"
langchain_chroma = "*"
unstructured = ">=0.17,<0.21"
jq = "*"
qdarkstyle = "*"
pexpect = "^4.9.0"

[tool.poetry.extras]
flash = [ "flash-attn",]

[tool.pytest.ini_options]
testpaths = [ "tests",]

[tool.coverage.run]
source = [ "src/nebula",]

[tool.coverage.report]
fail_under = 100
show_missing = true
